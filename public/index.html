<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub - Nonton Video Terbaru & Terpopuler</title>
<meta name="description" content="StreamHub adalah platform streaming video modern. Temukan video terbaru dan terpopuler dari berbagai kategori.">
<meta property="og:title" content="StreamHub - Nonton Video Terbaru & Terpopuler">
<meta property="og:description" content="Platform streaming video modern dengan koleksi terbaru dan terpopuler.">
<meta property="og:type" content="website">
<link rel="canonical" href="/">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b0c10">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/css/style.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "StreamHub",
  "url": "/"
}
</script>
</head>
<body>
<script src="/js/applock.js"></script>

<header class="site-header">
  <div class="container">
    <a href="/" class="logo">Stream<span>Hub</span></a>
    <nav class="main-nav">
      <a href="/" class="active">Home</a>
      <a href="/category/">Kategori</a>
      <a href="/search/">Cari</a>
    </nav>
    <div class="header-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="quickSearch" placeholder="Cari video...">
    </div>
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <button class="mobile-menu-btn" id="siteMenuBtn" aria-label="Menu lainnya">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
    </button>
  </div>
</header>

<div id="siteMenuDropdown" class="site-menu-dropdown">
  <a href="/">Home</a>
  <a href="/category/">Kategori</a>
  <a href="/privacy/">Kebijakan Privasi</a>
  <a href="/terms/">Syarat &amp; Ketentuan</a>
</div>

<main class="container">
  <section class="hero">
    <h1>Selamat Datang di StreamHub</h1>
    <p id="heroSubtitle">Nonton video terbaru dan terpopuler, kapan saja, di mana saja.</p>
  </section>

  <div class="chip-row" id="categoryChips">
    <a href="/category/" class="chip active">Semua</a>
  </div>

  <div class="ad-slot" data-ad-placement="home_top"></div>

  <section class="section">
    <div class="section-title">
      <h2>Video Terbaru</h2>
    </div>
    <div class="video-grid" id="latestGrid"></div>
  </section>

  <div class="ad-slot" data-ad-placement="home_grid"></div>

  <section class="section">
    <div class="section-title">
      <h2>Video Populer</h2>
    </div>
    <div class="video-grid" id="popularGrid"></div>
  </section>

  <section class="section">
    <div class="section-title">
      <h2>Semua Video</h2>
    </div>
    <div class="video-grid" id="allGrid"></div>
    <div class="loader-row" id="loaderRow" style="display:none;"><div class="spinner"></div></div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    &copy; <span id="year"></span> StreamHub. Semua hak dilindungi. &middot; <a href="/privacy/" style="color:inherit;text-decoration:underline;">Kebijakan Privasi</a> &middot; <a href="/terms/" style="color:inherit;text-decoration:underline;">Syarat &amp; Ketentuan</a>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="/js/utils.js"></script>
<script src="/js/site-config.js"></script>
<script src="/js/site-menu.js"></script>
<script src="/js/main.js"></script>
<script src="/js/ads.js"></script>
<script src="/js/pwa.js"></script>
<script src="/js/push.js"></script>
<script src="/js/tracker.js"></script>
<script src="/js/cs-widget.js"></script>
</body>
</html>
