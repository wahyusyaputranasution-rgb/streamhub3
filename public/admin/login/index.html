<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - StreamHub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<script src="/js/applock.js"></script>

<div class="login-page">
  <div class="login-card">
    <h1>Stream<span style="color:var(--accent);">Hub</span></h1>
    <p class="sub">Masuk ke Dashboard Admin</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="field-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Masuk</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/utils.js"></script>
<script src="/js/admin-login.js"></script>
</body>
</html>
