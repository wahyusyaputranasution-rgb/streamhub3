name = "streamhubvideoplay1"
main = "src/index.js"
compatibility_date = "2026-07-05"
compatibility_flags = ["nodejs_compat"]

# Folder berisi semua file statis (HTML/CSS/JS) yang disajikan langsung
# oleh Cloudflare. Worker (src/index.js) hanya dipanggil untuk request
# yang tidak cocok dengan file statis, yaitu /api/* dan /sitemap.xml.
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

# Cron Trigger: cek tiap 5 menit apakah ada video draft yang tanggal publish-nya
# sudah lewat, lalu otomatis dipublish (dan kirim notifikasi Telegram kalau aktif).
[triggers]
crons = ["*/5 * * * *"]

# D1 Database binding.
# Ambil "database_id" dari: Cloudflare Dashboard -> Workers & Pages -> D1
# -> klik database "streaming_db" -> salin Database ID di halaman Overview-nya.
[[d1_databases]]
binding = "DB"
database_name = "streaming_db"
database_id = "5d5d5e0d-094c-4ac1-a837-9f088ce70141"

[vars]
SITE_NAME = "StreamHub"
SITE_URL = "https://stremhubvideo.my.id"
VAPID_PUBLIC_KEY = "BJYUy-NRWIg-0BuLuwHfLrmWFx6sa04XXqwibvEInvaZPnAf8A4RYHONWwFgmBs_i1LksHjdhhGjT04Ej_PZioA"
