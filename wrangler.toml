# ============================================================
# Adsterra Revenue Dashboard - PENTING soal keamanan:
# ADSTERRA_API_KEY dan ADSTERRA_DOMAIN_ID SENGAJA TIDAK dituliskan di sini
# (file ini ikut ter-commit ke Git). Keduanya WAJIB diatur sebagai
# Cloudflare "Secret" lewat Dashboard, bukan sebagai [vars] biasa:
#
#   Cloudflare Dashboard -> Worker Anda -> Settings -> Variables and Secrets
#   -> Add -> pilih tipe "Secret" -> isi nama & nilainya, lalu Deploy.
#
# Variabel yang perlu ditambahkan sebagai Secret:
#   ADSTERRA_API_KEY    = token API dari akun Adsterra Anda
#                         (dashboard Adsterra -> Settings -> API -> Generate New Token)
#   ADSTERRA_DOMAIN_ID  = ID domain/website Anda di akun Adsterra (opsional,
#                         tergantung apakah akun Anda punya lebih dari satu domain)
# ============================================================
